<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inpatient Profee Coder Assistant</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 600px; 
            margin: auto; 
            background-color: #f4f7f6;
            color: #333;
        }
        h2 { 
            color: #2c3e50; 
            text-align: center;
        }
        .section { 
            background-color: white;
            margin-bottom: 20px; 
            padding: 20px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label { 
            font-weight: bold;
            display: block; 
            margin-bottom: 8px; 
        }
        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
        }
        .radio-group label {
            font-weight: normal;
            display: inline-block;
            margin-right: 15px;
            cursor: pointer;
        }
        button { 
            width: 100%;
            padding: 15px; 
            background-color: #2980b9; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 18px;
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover { 
            background-color: #1c5980; 
        }
        #result { 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 1.2em; 
            text-align: center;
            padding: 20px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background-color: #e8f8f5;
            border: 2px solid #27ae60;
            color: #27ae60;
        }
        .error {
            background-color: #fdebd0;
            border: 2px solid #e67e22;
            color: #d35400;
        }
    </style>
</head>
<body>

    <h2>Inpatient Profee Coder Assistant</h2>

    <div class="section">
        <div class="form-group">
            <label for="encounterType">Encounter Type:</label>
            <select id="encounterType">
                <option value="initial">Initial Hospital Care (99221-99223)</option>
                <option value="subsequent">Subsequent Hospital Care (99231-99233)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Payer Type (Affects Prolonged Services):</label>
            <div class="radio-group">
                <label><input type="radio" name="payer" value="ama" checked> Commercial / AMA</label>
                <label><input type="radio" name="payer" value="cms"> Medicare / CMS</label>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="form-group">
            <label>Select Coding Method:</label>
            <div class="radio-group">
                <label><input type="radio" name="method" value="mdm" checked onchange="toggleMethod()"> Medical Decision Making (MDM)</label>
                <label><input type="radio" name="method" value="time" onchange="toggleMethod()"> Total Time</label>
            </div>
        </div>

        <div id="mdmSection" class="form-group">
            <label for="mdmLevel">MDM Level:</label>
            <select id="mdmLevel">
                <option value="low">Straightforward or Low</option>
                <option value="moderate">Moderate</option>
                <option value="high">High</option>
            </select>
        </div>

        <div id="timeSection" class="form-group" style="display:none;">
            <label for="timeMinutes">Total Time on Date of Encounter (Minutes):</label>
            <input type="number" id="timeMinutes" placeholder="e.g., 85" min="0">
        </div>
    </div>

    <button onclick="calculateCPT()">Calculate CPT Code</button>

    <div id="result"></div>

    <script>
        function toggleMethod() {
            const method = document.querySelector('input[name="method"]:checked').value;
            if (method === 'mdm') {
                document.getElementById('mdmSection').style.display = 'block';
                document.getElementById('timeSection').style.display = 'none';
            } else {
                document.getElementById('mdmSection').style.display = 'none';
                document.getElementById('timeSection').style.display = 'block';
            }
        }

        function calculateCPT() {
            const type = document.getElementById('encounterType').value;
            const payer = document.querySelector('input[name="payer"]:checked').value;
            const method = document.querySelector('input[name="method"]:checked').value;
            const resultBox = document.getElementById('result');
            
            let output = "";
            let isError = false;

            if (method === 'mdm') {
                const mdm = document.getElementById('mdmLevel').value;
                if (type === 'initial') {
                    if (mdm === 'low') output = "99221";
                    else if (mdm === 'moderate') output = "99222";
                    else if (mdm === 'high') output = "99223";
                } else {
                    if (mdm === 'low') output = "99231";
                    else if (mdm === 'moderate') output = "99232";
                    else if (mdm === 'high') output = "99233";
                }
                output = "Suggested CPT (Based on MDM): " + output;
            } else {
                const timeStr = document.getElementById('timeMinutes').value;
                if (!timeStr) {
                    showResult("Please enter total minutes.", true);
                    return;
                }
                const time = parseInt(timeStr, 10);
                
                let baseCode = "";
                let prolongedCode = "";
                let prolongedUnits = 0;

                if (type === 'initial') {
                    if (time < 40) {
                        isError = true;
                        output = "Time does not meet the 40-minute minimum for 99221.";
                    } else if (time <= 54) baseCode = "99221";
                    else if (time <= 74) baseCode = "99222";
                    else {
                        baseCode = "99223";
                        if (payer === 'ama' && time >= 90) {
                            prolongedUnits = Math.floor((time - 75) / 15);
                            prolongedCode = "99418";
                        } else if (payer === 'cms' && time >= 105) {
                            prolongedUnits = Math.floor((time - 90) / 15);
                            prolongedCode = "G0316";
                        }
                    }
                } else { // Subsequent
                    if (time < 25) {
                        isError = true;
                        output = "Time does not meet the 25-minute minimum for 99231.";
                    } else if (time <= 34) baseCode = "99231";
                    else if (time <= 49) baseCode = "99232";
                    else {
                        baseCode = "99233";
                        if (payer === 'ama' && time >= 65) {
                            prolongedUnits = Math.floor((time - 50) / 15);
                            prolongedCode = "99418";
                        } else if (payer === 'cms' && time >= 80) {
                            prolongedUnits = Math.floor((time - 65) / 15);
                            prolongedCode = "G0316";
                        }
                    }
                }

                if (!isError) {
                    output = `Primary CPT (Based on Time): ${baseCode}`;
                    if (prolongedUnits > 0) {
                        output += `<br><br>+ Prolonged Services:<br>${prolongedCode} x ${prolongedUnits} unit(s)`;
                    }
                }
            }

            showResult(output, isError);
        }

        function showResult(text, isError) {
            const resultBox = document.getElementById('result');
            resultBox.innerHTML = text;
            resultBox.style.display = 'block';
            if (isError) {
                resultBox.className = 'error';
            } else {
                resultBox.className = 'success';
            }
        }
    </script>
</body>
</html>
